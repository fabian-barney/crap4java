name: Build

on:
  pull_request:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  core-and-cli:
    name: Core and CLI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build CLI and run core tests
        run: mvn -B -pl cli -am package

  gradle-plugin:
    name: Gradle Plugin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Package core jar
        run: mvn -B -pl core -am package

      - name: Set up Gradle wrapper permissions
        run: chmod +x gradle-plugin/gradlew

      - name: Run Gradle plugin functional tests
        working-directory: gradle-plugin
        run: ./gradlew test

  maven-plugin:
    name: Maven Plugin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run Maven plugin integration tests
        run: mvn -B -pl maven-plugin -am verify

  nullaway-jdk25:
    name: NullAway JDK 25
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Verify Maven build with NullAway profile
        run: mvn -B verify

  crap-java-gate:
    name: crap-java Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build CLI
        run: mvn -B -pl cli -am package

      - name: Resolve CLI jar path
        shell: bash
        run: |
          shopt -s nullglob
          jars=(cli/target/crap-java-cli-*.jar)
          filtered=()
          for jar in "${jars[@]}"; do
            case "$jar" in
              *-sources.jar|*-javadoc.jar|*-shaded.jar|*original*.jar) ;;
              *) filtered+=("$jar") ;;
            esac
          done
          if [ "${#filtered[@]}" -ne 1 ]; then
            echo "Expected exactly one built CLI jar, found ${#filtered[@]}" >&2
            printf 'Candidates:\n%s\n' "${filtered[@]}" >&2
            exit 1
          fi
          echo "CLI_JAR=${filtered[0]}" >> "$GITHUB_ENV"

      - name: Run Maven crap-java gate
        run: java -jar "$CLI_JAR" --build-tool maven core/src/main/java cli/src/main/java maven-plugin/src/main/java

      - name: Set up Gradle wrapper permissions
        run: chmod +x gradle-plugin/gradlew

      - name: Run Gradle crap-java gate
        run: java -jar "$CLI_JAR" --build-tool gradle gradle-plugin/src/main/java

  publishing-preflight:
    name: Publishing Preflight
    runs-on: ubuntu-latest
    env:
      MAVEN_CENTRAL_TOKEN_USERNAME: preflight-token-user
      MAVEN_CENTRAL_TOKEN_PASSWORD: preflight-token-password
      MAVEN_GPG_PASSPHRASE: preflight-passphrase

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          server-id: central
          server-username: MAVEN_CENTRAL_TOKEN_USERNAME
          server-password: MAVEN_CENTRAL_TOKEN_PASSWORD

      - name: Generate temporary GPG key for signing preflight
        shell: bash
        run: |
          export GNUPGHOME="$(mktemp -d)"
          echo "GNUPGHOME=${GNUPGHOME}" >> "$GITHUB_ENV"
          cat > gpg-batch.txt <<EOF
          Key-Type: RSA
          Key-Length: 2048
          Name-Real: crap-java preflight
          Name-Email: preflight@example.com
          Expire-Date: 0
          Passphrase: ${MAVEN_GPG_PASSPHRASE}
          %commit
          EOF
          gpg --batch --pinentry-mode loopback --generate-key gpg-batch.txt
          {
            echo "MAVEN_GPG_PRIVATE_KEY<<EOF"
            gpg --batch --pinentry-mode loopback --passphrase "${MAVEN_GPG_PASSPHRASE}" --armor --export-secret-keys preflight@example.com
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Run Maven publishing preflight
        run: mvn -B -Prelease -Dcentral.skipPublishing=true -pl .,cli,maven-plugin -am deploy

      - name: Set up Gradle wrapper permissions
        run: chmod +x gradle-plugin/gradlew

      - name: Validate Gradle plugin publication metadata
        working-directory: gradle-plugin
        run: ./gradlew test validatePlugins publishToMavenLocal

      - name: Verify legacy package registry references are gone
        shell: bash
        run: |
          if git grep -n -E 'maven\.pkg\.github\.com|gpr\.user|gpr\.key' -- . ':(exclude).github/workflows/build.yml'; then
            echo "Found banned legacy package-registry references in tracked sources." >&2
            exit 1
          fi
