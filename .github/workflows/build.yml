name: Build

on:
  pull_request:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  maven-test:
    name: Maven Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up JDK 25
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Run Maven tests
        run: mvn -B test
