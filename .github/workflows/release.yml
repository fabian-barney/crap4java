name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    name: Publish Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        env:
          MAVEN_CENTRAL_TOKEN_USERNAME: ${{ secrets.MAVEN_CENTRAL_TOKEN_USERNAME }}
          MAVEN_CENTRAL_TOKEN_PASSWORD: ${{ secrets.MAVEN_CENTRAL_TOKEN_PASSWORD }}
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          server-id: central
          server-username: MAVEN_CENTRAL_TOKEN_USERNAME
          server-password: MAVEN_CENTRAL_TOKEN_PASSWORD

      - name: Make Gradle wrapper executable
        run: chmod +x gradle-plugin/gradlew

      - name: Verify release version
        shell: bash
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          pom_version="$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)"
          gradle_version="$(cd gradle-plugin && ./gradlew -q properties | awk -F': ' '/^version:/ {print $2; exit}')"
          test "${pom_version}" = "${tag_version}"
          test "${gradle_version}" = "${tag_version}"

      - name: Run cognitive-java gate
        run: mvn -B cognitive-java:check

      - name: Build CLI for crap-java gate
        run: mvn -B -pl cli -am package

      - name: Resolve CLI jar path
        shell: bash
        run: |
          shopt -s nullglob
          jars=(cli/target/crap-java-cli-*.jar)
          filtered=()
          for jar in "${jars[@]}"; do
            case "$jar" in
              *-sources.jar|*-javadoc.jar|*-shaded.jar|*original*.jar) ;;
              *) filtered+=("$jar") ;;
            esac
          done
          if [ "${#filtered[@]}" -ne 1 ]; then
            echo "Expected exactly one built CLI jar, found ${#filtered[@]}" >&2
            printf 'Candidates:\n%s\n' "${filtered[@]}" >&2
            exit 1
          fi
          echo "CLI_JAR=${filtered[0]}" >> "$GITHUB_ENV"

      - name: Run Maven-source crap-java gate
        run: |
          mkdir -p target/crap-java
          java -jar "$CLI_JAR" \
            --format text \
            --junit-report target/crap-java/TEST-crap-java-maven-sources.xml \
            --build-tool maven \
            core/src/main/java cli/src/main/java maven-plugin/src/main/java

      - name: Run Gradle-plugin crap-java gate
        run: |
          mkdir -p target/crap-java
          java -jar "$CLI_JAR" \
            --format text \
            --junit-report target/crap-java/TEST-crap-java-gradle-plugin.xml \
            --build-tool gradle \
            gradle-plugin/src/main/java

      - name: Import GPG key
        env:
          MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
        shell: bash
        run: |
          export GNUPGHOME="$(mktemp -d)"
          echo "GNUPGHOME=${GNUPGHOME}" >> "$GITHUB_ENV"
          printf '%s' "$MAVEN_GPG_PRIVATE_KEY" | gpg --batch --import

      - name: Publish Maven artifacts
        env:
          MAVEN_CENTRAL_TOKEN_USERNAME: ${{ secrets.MAVEN_CENTRAL_TOKEN_USERNAME }}
          MAVEN_CENTRAL_TOKEN_PASSWORD: ${{ secrets.MAVEN_CENTRAL_TOKEN_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: mvn -B -Prelease -pl .,cli,maven-plugin -am deploy

      - name: Publish Gradle plugin artifacts to Maven Central
        env:
          MAVEN_CENTRAL_TOKEN_USERNAME: ${{ secrets.MAVEN_CENTRAL_TOKEN_USERNAME }}
          MAVEN_CENTRAL_TOKEN_PASSWORD: ${{ secrets.MAVEN_CENTRAL_TOKEN_PASSWORD }}
          MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        working-directory: gradle-plugin
        run: ./gradlew publishAllPublicationsToCentralPortalOssrhStagingRepository

      - name: Finalize Gradle plugin Maven Central deployment
        env:
          MAVEN_CENTRAL_TOKEN_USERNAME: ${{ secrets.MAVEN_CENTRAL_TOKEN_USERNAME }}
          MAVEN_CENTRAL_TOKEN_PASSWORD: ${{ secrets.MAVEN_CENTRAL_TOKEN_PASSWORD }}
        shell: bash
        run: |
          auth="$(printf '%s:%s' "${MAVEN_CENTRAL_TOKEN_USERNAME}" "${MAVEN_CENTRAL_TOKEN_PASSWORD}" | base64 -w 0)"
          curl --fail --request POST \
            --header "Authorization: Bearer ${auth}" \
            "https://ossrh-staging-api.central.sonatype.com/manual/upload/defaultRepository/media.barney?publishing_type=automatic"

      - name: Publish Gradle plugin
        env:
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}
          MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        working-directory: gradle-plugin
        run: ./gradlew publishPlugins -Pgradle.publish.key="${GRADLE_PUBLISH_KEY}" -Pgradle.publish.secret="${GRADLE_PUBLISH_SECRET}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v version="${version}" '
            $1 == "##" && $2 == version {
              found = 1
            }
            found {
              if ($1 == "##" && $2 != version) {
                exit
              }
              print
            }
            END {
              if (!found) {
                exit 1
              }
            }
          ' CHANGELOG.md > release-notes.md
          test -s release-notes.md
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release edit "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes-file release-notes.md
          else
            gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes-file release-notes.md
          fi
